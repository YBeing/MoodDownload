<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 960" role="img" aria-labelledby="title desc">
  <title id="title">MoodDownload - 任务详情抽屉高保真设计稿</title>
  <desc id="desc">深色技术风任务详情抽屉，展示状态、进度、链接、目录和操作按钮。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b0f14"/>
      <stop offset="100%" stop-color="#101723"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0%" stop-color="#23c7ff"/>
      <stop offset="100%" stop-color="#4a8dff"/>
    </linearGradient>
    <linearGradient id="progress" x1="0" x2="1">
      <stop offset="0%" stop-color="#23c7ff"/>
      <stop offset="100%" stop-color="#36f3c8"/>
    </linearGradient>
    <filter id="drawerShadow" x="-20%" y="-10%" width="140%" height="120%">
      <feDropShadow dx="-10" dy="0" stdDeviation="14" flood-color="#02070d" flood-opacity="0.5"/>
    </filter>
    <style>
      .title { fill:#f4f8ff; font:700 26px 'HarmonyOS Sans SC','Microsoft YaHei',sans-serif; }
      .primary { fill:#eaf2ff; font:600 15px 'HarmonyOS Sans SC','Microsoft YaHei',sans-serif; }
      .secondary { fill:#9cb0c9; font:500 13px 'HarmonyOS Sans SC','Microsoft YaHei',sans-serif; }
      .small { fill:#6f8198; font:500 11px 'HarmonyOS Sans SC','Microsoft YaHei',sans-serif; }
      .mono { fill:#d9ecff; font:600 12px 'JetBrains Mono','IBM Plex Sans','Consolas',monospace; }
    </style>
  </defs>

  <rect width="1440" height="960" fill="url(#bg)"/>
  <rect x="0" y="0" width="1440" height="960" fill="#010509" opacity=".22"/>

  <rect x="0" y="0" width="1440" height="70" fill="#0d141d"/>
  <text x="140" y="42" fill="#f4f8ff" font-family="HarmonyOS Sans SC,Microsoft YaHei,sans-serif" font-size="28" font-weight="700">下载中</text>

  <rect x="132" y="98" width="818" height="760" rx="28" fill="#111823" stroke="#223043"/>
  <text x="166" y="136" fill="#f4f8ff" font-family="HarmonyOS Sans SC,Microsoft YaHei,sans-serif" font-size="17" font-weight="700">任务列表背景层</text>
  <rect x="166" y="164" width="752" height="102" rx="18" fill="#101823" stroke="#243547"/>
  <rect x="166" y="286" width="752" height="102" rx="18" fill="#101823" stroke="#243547"/>
  <rect x="166" y="408" width="752" height="102" rx="18" fill="#101823" stroke="#243547"/>

  <rect x="930" y="44" width="486" height="872" rx="28" fill="#121b28" stroke="#2b4159" filter="url(#drawerShadow)"/>
  <rect x="930" y="44" width="486" height="84" rx="28" fill="#0e151f"/>
  <text x="964" y="90" class="title">任务详情</text>
  <circle cx="1378" cy="86" r="18" fill="#141d29" stroke="#33485f"/>
  <path d="M1371 79l14 14m0-14-14 14" stroke="#a7bdd6" stroke-width="2" stroke-linecap="round"/>

  <text x="964" y="164" class="primary" style="font-size:18px;">ubuntu-24.04-desktop-amd64.iso</text>
  <text x="964" y="186" class="small">TASK-20260418-0001</text>
  <rect x="1276" y="150" width="106" height="30" rx="15" fill="rgba(35,199,255,.12)" stroke="#23c7ff"/>
  <text x="1329" y="170" text-anchor="middle" fill="#8ce6ff" font-family="JetBrains Mono,IBM Plex Sans,monospace" font-size="12" font-weight="700">ACTIVE</text>

  <g>
    <text x="964" y="230" class="small">下载进度</text>
    <rect x="964" y="246" width="388" height="12" rx="6" fill="#0c1219"/>
    <rect x="964" y="246" width="284" height="12" rx="6" fill="url(#progress)"/>
    <text x="1360" y="257" text-anchor="end" class="mono">73%</text>
    <text x="964" y="284" class="secondary">1.9 / 2.6 GB</text>
    <text x="1180" y="284" class="secondary">剩余 04m 16s</text>
  </g>

  <g>
    <rect x="964" y="316" width="418" height="96" rx="20" fill="#0f1722" stroke="#243547"/>
    <text x="988" y="346" class="small">原始链接</text>
    <text x="988" y="372" class="mono">https://releases.ubuntu.com/24.04/ubuntu-24.04-desktop-amd64.iso</text>
    <text x="988" y="394" class="small">来源协议：HTTP</text>
  </g>

  <g>
    <rect x="964" y="432" width="418" height="104" rx="20" fill="#0f1722" stroke="#243547"/>
    <text x="988" y="462" class="small">保存目录</text>
    <text x="988" y="488" class="mono">D:\Downloads\Linux\ISO</text>
    <text x="988" y="516" class="secondary">最后活动时间：12:42:10</text>
  </g>

  <g>
    <rect x="964" y="556" width="198" height="106" rx="20" fill="#0f1722" stroke="#243547"/>
    <text x="988" y="586" class="small">下载速度</text>
    <text x="988" y="620" fill="#23c7ff" font-family="JetBrains Mono,IBM Plex Sans,monospace" font-size="26" font-weight="700">3.84 MB/s</text>
    <text x="988" y="644" class="secondary">当前稳定下载</text>
  </g>
  <g>
    <rect x="1184" y="556" width="198" height="106" rx="20" fill="#0f1722" stroke="#243547"/>
    <text x="1208" y="586" class="small">上传速度</text>
    <text x="1208" y="620" fill="#eaf2ff" font-family="JetBrains Mono,IBM Plex Sans,monospace" font-size="26" font-weight="700">0 KB/s</text>
    <text x="1208" y="644" class="secondary">当前无上传</text>
  </g>

  <g>
    <rect x="964" y="682" width="418" height="108" rx="20" fill="#101722" stroke="#3a3140"/>
    <text x="988" y="712" class="small">错误信息 / 异常态预留</text>
    <text x="988" y="738" class="secondary">当前无错误。若失败时，此处展示 errorCode 与 errorMessage。</text>
    <text x="988" y="760" class="small">RETRY_COUNT: 0</text>
  </g>

  <rect x="964" y="828" width="418" height="1" fill="#243547"/>
  <g>
    <rect x="964" y="850" width="88" height="40" rx="20" fill="#101722" stroke="#2c4d69"/>
    <text x="1008" y="874" text-anchor="middle" class="secondary">暂停</text>
    <rect x="1064" y="850" width="88" height="40" rx="20" fill="#101722" stroke="#2c4d69"/>
    <text x="1108" y="874" text-anchor="middle" class="secondary">继续</text>
    <rect x="1164" y="850" width="88" height="40" rx="20" fill="#101722" stroke="#2c4d69"/>
    <text x="1208" y="874" text-anchor="middle" class="secondary">重试</text>
    <rect x="1264" y="850" width="118" height="40" rx="20" fill="#1c2029" stroke="#624151"/>
    <text x="1323" y="874" text-anchor="middle" fill="#ff95a6" font-family="HarmonyOS Sans SC,Microsoft YaHei,sans-serif" font-size="13" font-weight="700">删除任务</text>
  </g>
</svg>
