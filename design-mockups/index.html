<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MoodDownload Static Mockups</title>
    <style>
      :root {
        --bg: #0b0f14;
        --panel: #121b28;
        --line: #223043;
        --text: #eaf2ff;
        --muted: #8ea3bd;
        --accent: #23c7ff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: radial-gradient(circle at top left, #111a28, #0b0f14 55%);
        color: var(--text);
        font-family: "HarmonyOS Sans SC", "Microsoft YaHei", sans-serif;
      }
      .wrap {
        width: min(1240px, calc(100vw - 48px));
        margin: 32px auto 48px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 32px;
      }
      p {
        margin: 0 0 24px;
        color: var(--muted);
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 20px;
      }
      .card {
        background: rgba(18, 27, 40, 0.88);
        border: 1px solid var(--line);
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
      }
      .meta {
        padding: 16px 18px 12px;
        border-bottom: 1px solid var(--line);
      }
      .meta h2 {
        margin: 0 0 6px;
        font-size: 18px;
      }
      .meta span {
        color: var(--muted);
        font-size: 13px;
      }
      .preview {
        display: block;
        width: 100%;
        aspect-ratio: 3 / 2;
        background: #0d131c;
        border: 0;
      }
      .actions {
        display: flex;
        gap: 10px;
        padding: 14px 18px 18px;
      }
      a {
        color: var(--accent);
        text-decoration: none;
        font-size: 13px;
      }
      .pill {
        display: inline-flex;
        align-items: center;
        padding: 6px 10px;
        border: 1px solid #2b425a;
        border-radius: 999px;
        color: var(--muted);
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>MoodDownload 静态设计稿</h1>
      <p>基于高保真 brief 直接导出的 SVG 静态页面稿，可在浏览器中本地预览。</p>
      <div class="grid">
        <section class="card">
          <div class="meta">
            <h2>下载中 / Running Dashboard</h2>
            <span class="pill">主工作台</span>
          </div>
          <img class="preview" src="./running-dashboard.svg" alt="下载中页面设计稿" />
          <div class="actions"><a href="./running-dashboard.svg">打开 SVG</a></div>
        </section>
        <section class="card">
          <div class="meta">
            <h2>新建任务弹窗</h2>
            <span class="pill">高频交互浮层</span>
          </div>
          <img class="preview" src="./new-task-modal.svg" alt="新建任务弹窗设计稿" />
          <div class="actions"><a href="./new-task-modal.svg">打开 SVG</a></div>
        </section>
        <section class="card">
          <div class="meta">
            <h2>任务详情抽屉</h2>
            <span class="pill">右侧信息面板</span>
          </div>
          <img class="preview" src="./task-detail-drawer.svg" alt="任务详情抽屉设计稿" />
          <div class="actions"><a href="./task-detail-drawer.svg">打开 SVG</a></div>
        </section>
        <section class="card">
          <div class="meta">
            <h2>设置页</h2>
            <span class="pill">系统配置面板</span>
          </div>
          <img class="preview" src="./settings-page.svg" alt="设置页设计稿" />
          <div class="actions"><a href="./settings-page.svg">打开 SVG</a></div>
        </section>
        <section class="card">
          <div class="meta">
            <h2>失败页</h2>
            <span class="pill">错误诊断与恢复</span>
          </div>
          <img class="preview" src="./failed-page.svg" alt="失败页设计稿" />
          <div class="actions"><a href="./failed-page.svg">打开 SVG</a></div>
        </section>
      </div>
    </div>
  </body>
</html>
