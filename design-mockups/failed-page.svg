<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 960" role="img" aria-labelledby="title desc">
  <title id="title">MoodDownload - 失败页面高保真设计稿</title>
  <desc id="desc">强调错误信息和重试动作的失败任务页面。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b0f14"/>
      <stop offset="100%" stop-color="#101723"/>
    </linearGradient>
    <linearGradient id="danger" x1="0" x2="1">
      <stop offset="0%" stop-color="#ff6478"/>
      <stop offset="100%" stop-color="#ff8f61"/>
    </linearGradient>
    <style>
      .title { fill:#f4f8ff; font:700 28px 'HarmonyOS Sans SC','Microsoft YaHei',sans-serif; }
      .primary { fill:#eaf2ff; font:600 15px 'HarmonyOS Sans SC','Microsoft YaHei',sans-serif; }
      .secondary { fill:#9cb0c9; font:500 13px 'HarmonyOS Sans SC','Microsoft YaHei',sans-serif; }
      .small { fill:#6f8198; font:500 11px 'HarmonyOS Sans SC','Microsoft YaHei',sans-serif; }
      .mono { fill:#ffd4da; font:600 12px 'JetBrains Mono','IBM Plex Sans','Consolas',monospace; }
    </style>
  </defs>

  <rect width="1440" height="960" fill="url(#bg)"/>
  <rect x="0" y="0" width="110" height="960" fill="#0d131c" stroke="#202d40"/>
  <text x="54" y="437" text-anchor="middle" fill="#f4f8ff" font-family="HarmonyOS Sans SC,Microsoft YaHei,sans-serif" font-size="13" font-weight="700">失败</text>

  <rect x="110" y="0" width="1330" height="70" fill="#0d141d"/>
  <text x="148" y="44" class="title">失败</text>
  <text x="148" y="61" class="small">Failed Tasks / Recovery Console</text>

  <rect x="142" y="98" width="1240" height="110" rx="24" fill="#141923" stroke="#332b34"/>
  <text x="170" y="133" class="primary" style="font-size:15px;">故障摘要</text>
  <text x="170" y="153" class="small">最近失败任务与重试入口，强调诊断和恢复。</text>
  <rect x="170" y="170" width="210" height="20" rx="10" fill="#1b1015" stroke="#5a323a"/>
  <circle cx="184" cy="180" r="4" fill="#ff5d73"/>
  <text x="196" y="184" class="small">当前有 3 个失败任务等待处理</text>

  <rect x="142" y="230" width="1240" height="66" rx="18" fill="#151e2b" stroke="#243547"/>
  <rect x="168" y="247" width="280" height="32" rx="16" fill="#101722" stroke="#243345"/>
  <text x="194" y="268" class="secondary" style="font-size:12px;">错误筛选：全部</text>
  <rect x="466" y="247" width="220" height="32" rx="16" fill="#101722" stroke="#243345"/>
  <text x="492" y="268" class="secondary" style="font-size:12px;">最近失败时间：24h</text>

  <rect x="142" y="318" width="1240" height="568" rx="24" fill="#111823" stroke="#223043"/>
  <text x="172" y="350" class="small">文件</text>
  <text x="612" y="350" class="small">错误摘要</text>
  <text x="1046" y="350" class="small">最近失败时间</text>
  <text x="1260" y="350" class="small">操作</text>
  <line x1="170" y1="366" x2="1354" y2="366" stroke="#243547"/>

  <g transform="translate(0,0)">
    <rect x="160" y="384" width="1204" height="96" rx="18" fill="#141923" stroke="#4e3038"/>
    <circle cx="201" cy="432" r="11" fill="none" stroke="#ff5d73" stroke-width="2"/>
    <path d="M196 427l10 10m0-10-10 10" stroke="#ff5d73" stroke-width="2" stroke-linecap="round"/>
    <text x="236" y="423" class="primary">game-assets-pack.part05.rar</text>
    <text x="236" y="445" class="small">HTTPS / cdn-mirror.example.com</text>
    <text x="612" y="422" class="mono">NETWORK_TIMEOUT</text>
    <text x="612" y="444" class="secondary">连接超时，远端源站响应不稳定</text>
    <text x="1046" y="432" class="secondary">2026-04-18 14:02:16</text>
    <rect x="1230" y="410" width="64" height="30" rx="15" fill="url(#danger)"/>
    <text x="1262" y="430" text-anchor="middle" fill="#22090e" font-family="HarmonyOS Sans SC,Microsoft YaHei,sans-serif" font-size="12" font-weight="700">重试</text>
    <rect x="1304" y="410" width="52" height="30" rx="15" fill="#171d26" stroke="#5a323a"/>
    <text x="1330" y="430" text-anchor="middle" fill="#ffb6c1" font-family="HarmonyOS Sans SC,Microsoft YaHei,sans-serif" font-size="12" font-weight="700">删</text>
  </g>

  <g transform="translate(0,112)">
    <rect x="160" y="384" width="1204" height="96" rx="18" fill="#141923" stroke="#4e3038"/>
    <circle cx="201" cy="432" r="11" fill="none" stroke="#ff5d73" stroke-width="2"/>
    <path d="M196 427l10 10m0-10-10 10" stroke="#ff5d73" stroke-width="2" stroke-linecap="round"/>
    <text x="236" y="423" class="primary">archlinux-2026.04-x86_64.iso</text>
    <text x="236" y="445" class="small">BT / magnet:?xt=urn:btih...</text>
    <text x="612" y="422" class="mono">TORRENT_METADATA_ERROR</text>
    <text x="612" y="444" class="secondary">元数据解析异常，种子内容可能损坏</text>
    <text x="1046" y="432" class="secondary">2026-04-18 12:39:48</text>
    <rect x="1230" y="410" width="64" height="30" rx="15" fill="url(#danger)"/>
    <text x="1262" y="430" text-anchor="middle" fill="#22090e" font-family="HarmonyOS Sans SC,Microsoft YaHei,sans-serif" font-size="12" font-weight="700">重试</text>
    <rect x="1304" y="410" width="52" height="30" rx="15" fill="#171d26" stroke="#5a323a"/>
    <text x="1330" y="430" text-anchor="middle" fill="#ffb6c1" font-family="HarmonyOS Sans SC,Microsoft YaHei,sans-serif" font-size="12" font-weight="700">删</text>
  </g>

  <g transform="translate(0,224)">
    <rect x="160" y="384" width="1204" height="96" rx="18" fill="#141923" stroke="#4e3038"/>
    <circle cx="201" cy="432" r="11" fill="none" stroke="#ff5d73" stroke-width="2"/>
    <path d="M196 427l10 10m0-10-10 10" stroke="#ff5d73" stroke-width="2" stroke-linecap="round"/>
    <text x="236" y="423" class="primary">project-source-code.tar.gz</text>
    <text x="236" y="445" class="small">HTTPS / internal-storage.example.com</text>
    <text x="612" y="422" class="mono">INSUFFICIENT_DISK_SPACE</text>
    <text x="612" y="444" class="secondary">目标磁盘剩余空间不足，需释放后重试</text>
    <text x="1046" y="432" class="secondary">2026-04-18 09:20:31</text>
    <rect x="1230" y="410" width="64" height="30" rx="15" fill="url(#danger)"/>
    <text x="1262" y="430" text-anchor="middle" fill="#22090e" font-family="HarmonyOS Sans SC,Microsoft YaHei,sans-serif" font-size="12" font-weight="700">重试</text>
    <rect x="1304" y="410" width="52" height="30" rx="15" fill="#171d26" stroke="#5a323a"/>
    <text x="1330" y="430" text-anchor="middle" fill="#ffb6c1" font-family="HarmonyOS Sans SC,Microsoft YaHei,sans-serif" font-size="12" font-weight="700">删</text>
  </g>
</svg>
